name: "MegaLinter"

on:
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  megalinter:
    name: MegaLinter
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: MegaLinter
        id: ml
        uses: oxsecurity/megalinter/flavors/python@v8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_ALL_CODEBASE: false
          DEFAULT_BRANCH: main
          PRINT_ALPACA: false
          DISABLE_ERRORS: true
